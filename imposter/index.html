<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێ فریودەرە؟ | زەنگ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: linear-gradient(135deg, #f3f4f6 0%, #eef2ff 50%, #fae8ff 100%);
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }

        .neon-bg-1 {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, rgba(236,72,153,0) 70%);
            top: -5%;
            left: -10%;
            z-index: -1;
            animation: pulseGlow 6s infinite alternate;
        }
        .neon-bg-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, rgba(99,102,241,0) 70%);
            bottom: 5%;
            right: -10%;
            z-index: -1;
            animation: pulseGlow 9s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.12); opacity: 1; }
        }

        .glass-box { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px); 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            border-bottom: 5px solid rgba(0, 0, 0, 0.08); 
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.04); 
            border-radius: 1.5rem;
        }

        .btn-cyber { 
            border-bottom: 3px solid rgba(0,0,0,0.15); 
            transition: all 0.2s ease-in-out; 
        }
        .btn-cyber:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
        }
        .btn-cyber:active { 
            transform: translateY(1px); 
            border-bottom-width: 1px; 
        }

        .card-inner { transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col items-center">

    <div class="neon-bg-1"></div>
    <div class="neon-bg-2"></div>

    <header class="w-full max-w-4xl mx-auto mb-8 px-4 py-3 bg-white/50 backdrop-blur-md rounded-2xl border border-white/60 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#3b82f6] animate-pulse"></div>
            <h1 class="text-xl md:text-2xl font-[900] text-gray-800">کێ فریودەرە؟</h1>
        </div>
        <nav class="flex gap-4 font-black text-sm md:text-base text-gray-700">
            <a href="../index.html" class="hover:text-blue-600 transition">➔ گەڕانەوە</a>
        </nav>
    </header>

    <div id="section-setup" class="w-full max-w-md glass-box p-6 md:p-8">
        <div class="flex items-center justify-center gap-2 mb-6 border-b-2 border-purple-100 pb-4">
            <div class="w-2.5 h-2.5 rounded-full bg-purple-600 shadow-[0_0_8px_#a855f7]"></div>
            <h1 class="text-3xl font-[900] text-gray-800 text-center">ڕێکخستنی یاری</h1>
        </div>

        <div id="player-inputs" class="space-y-3">
            <input type="text" placeholder="ناوی یاریزانی ١" class="w-full p-3 bg-white/50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:border-purple-500 focus:bg-white transition">
            <input type="text" placeholder="ناوی یاریزانی ٢" class="w-full p-3 bg-white/50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:border-purple-500 focus:bg-white transition">
            <input type="text" placeholder="ناوی یاریزانی ٣" class="w-full p-3 bg-white/50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:border-purple-500 focus:bg-white transition">
            <input type="text" placeholder="ناوی یاریزانی ٤" class="w-full p-3 bg-white/50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:border-purple-500 focus:bg-white transition">
        </div>
        
        <div class="flex gap-3 mt-6">
            <button onclick="addInput()" class="flex-1 bg-emerald-500 text-white btn-cyber py-3 rounded-xl font-black text-base shadow-sm shadow-emerald-500/10">+ زیادکردن</button>
            <button onclick="removeInput()" class="flex-1 bg-rose-500 text-white btn-cyber py-3 rounded-xl font-black text-base shadow-sm shadow-rose-500/10">- کەمکردن</button>
        </div>
        
        <div id="imposter-selection" class="hidden mt-6 pt-4 border-t-2 border-purple-100 border-dashed">
            <label class="block font-black text-base mb-2 text-gray-700 text-right">🕵️‍♂️ ژمارەی فریودەرەکان:</label>
            <select id="imposter-count" class="w-full p-3 border-2 border-purple-100 rounded-xl font-bold outline-none bg-white/80">
                <option value="1">١ فریودەر</option>
                <option value="2">٢ فریودەر</option>
                <option value="3">٣ فریودەر</option>
            </select>
        </div>
        
        <button onclick="startGame()" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-indigo-600 text-white btn-cyber py-4 rounded-xl font-[900] text-xl shadow-lg shadow-purple-500/20">تیروپشک! 🎲</button>
    </div>

    <div id="section-game" class="hidden-section w-full max-w-sm text-center">
        <div class="bg-purple-900 text-purple-100 inline-block px-6 py-2 rounded-xl font-black text-lg mb-4 shadow-sm">
            نۆبەی: <span id="current-player-name" class="text-yellow-300">ناو</span>
        </div>
        
        <div class="relative w-full h-[360px] md:h-[400px] mb-6" style="perspective: 1000px;">
            <div id="main-card" class="card-inner w-full h-full relative cursor-pointer" onclick="flipCard()">
                
                <div class="absolute w-full h-full bg-gradient-to-br from-purple-600 to-indigo-700 rounded-2xl flex flex-col items-center justify-center shadow-xl border border-white/20" style="backface-visibility: hidden;">
                    <div class="text-7xl mb-4 drop-shadow-md animate-bounce">❓</div>
                    <p class="font-black text-xl text-white/90 tracking-wide">بۆ بینینی ناوەکە کلیک بکە</p>
                </div>
                
                <div class="absolute w-full h-full bg-white rounded-2xl flex flex-col items-center justify-center p-6 shadow-xl border-2 border-purple-200" style="transform: rotateY(180deg); backface-visibility: hidden;">
                    <span class="text-sm font-black text-purple-400 uppercase tracking-widest mb-2">ڕۆڵی تۆ بریتییە لە</span>
                    <h2 id="card-content" class="text-3xl font-[900] text-purple-950 mb-4 px-4 py-2 bg-purple-50 rounded-xl border border-purple-100">...</h2>
                    
                    <button id="hint-button" onclick="showImposterHint(event)" class="hidden mb-6 bg-amber-100 border border-amber-300 text-amber-800 px-4 py-1.5 rounded-full font-black text-xs flex items-center gap-1 hover:bg-amber-200 transition">
                        💡 پێشنیاری وشە (ئاماژە)
                    </button>
                    <p id="hint-text" class="hidden text-sm font-bold text-amber-600 bg-amber-50 p-2 rounded-lg border border-amber-200 mb-4 w-full"></p>

                    <button onclick="lockCard(event)" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-black btn-cyber text-base">بیشارەوە 🔐</button>
                </div>

            </div>
        </div>
        <button id="btn-next" onclick="nextPlayer()" class="hidden w-full bg-emerald-500 text-white btn-cyber py-4 rounded-xl font-[900] text-xl shadow-md">کەسی دواتر ➔</button>
    </div>

    <div id="section-timer" class="hidden-section text-center max-w-md w-full px-4">
        <div class="glass-box p-6 md:p-8 border-t-4 border-t-indigo-500">
            <h2 class="text-2xl font-[900] mb-4 text-indigo-950">کاتی گفتوگۆ و گۆمان</h2>
            
            <div class="bg-white/60 border border-purple-100 p-4 rounded-xl mb-6 shadow-sm">
                <p class="font-bold text-gray-500 text-sm mb-1">کەسی یەکەم کە دەست بە قسە دەکات:</p>
                <h3 id="starter-name" class="text-2xl font-black text-purple-700">...</h3>
            </div>

            <div id="timer-display" class="text-6xl font-black my-6 text-rose-600 tracking-wider font-mono bg-rose-50 inline-block px-6 py-2 rounded-2xl border border-rose-100">03:00</div>
            <button id="btn-start-timer" onclick="startTimerCountdown()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black btn-cyber text-lg shadow-md">دەستپێکردنی کات ⏱️</button>
            <button id="btn-end-game" onclick="showFinalResult()" class="hidden w-full bg-rose-500 text-white py-4 rounded-xl font-black btn-cyber text-lg shadow-md">کێ فریودەر بوو؟ (ئەنجام)</button>
        </div>
    </div>

    <div id="section-finish" class="hidden-section text-center max-w-md w-full px-4">
        <div class="glass-box p-6 md:p-8 border-t-4 border-t-rose-500">
            <h2 class="text-2xl font-[900] mb-4 text-gray-600 italic">فریودەرەکان بریتی بوون لە:</h2>
            <div class="bg-rose-50 border border-rose-100 p-5 rounded-xl mb-6 shadow-sm">
                <h3 id="imposter-name" class="text-2xl font-black text-rose-600 leading-relaxed">ناو</h3>
            </div>

            <div id="penalty-box" class="hidden bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6 shadow-inner animate-pulse">
                <p class="text-xs font-black text-amber-500 uppercase tracking-wider mb-1">🎯 سزای فریودەری دۆڕاو</p>
                <h4 id="penalty-text" class="text-lg font-black text-amber-950">...</h4>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btn-penalty" onclick="generatePenalty()" class="w-full bg-amber-500 text-white py-3 rounded-xl font-black btn-cyber text-base shadow-md">سزای دۆڕاو! 🔥</button>
                <button onclick="location.reload()" class="w-full bg-gray-900 text-white py-4 rounded-xl font-black btn-cyber text-lg">یاری نوێ 🔄</button>
            </div>
        </div>
    </div>

    <script>
        let players = []; let roles = []; let currentIndex = 0; let isLocked = false;
        let imposterNames = []; let timerInterval; let currentSecretWord = "";

        // بانکی وشەکان پۆلێن کراوە بۆ ئەوەی سیستمی ئاماژە (Hint) بە جوانی کاربکات
        const categorizedWords = {
            food: ["برنج", "شۆربا", "یاپراخ", "شاوەرمە", "فەلافل", "بورگەر", "کفتە", "شێلم", "کولا", "چای", "نیسکێنە", "هێلکە", "پەنیر", "پیتزا", "کەباب"],
            fruit: ["سێو", "شەمامە", "شوتی", "پرتەقاڵ", "مۆز", "کێوی", "هەنار", "ترێ", "خەیار", "تەماتە", "گێزەر"],
            place: ["سلێمانی", "دهۆک", "کەرکووک", "کۆیە", "زاخۆ", "عێراق", "کوردستان", "ئێران", "تورکیا", "بەغداد", "پاریس", "قوتابخانە", "بازاڕ", "هەولێر"],
            tech: ["کۆمپیوتەر", "تەلەفزیۆن", "سەلاجە", "سپلیت", "کامێرا", "گڵۆپ", "تەختەکلیل", "ماوس", "ئایپاد", "ئۆتۆمbێل", "پاسکیل", "مۆبایل", "سەعات"],
            animal: ["شێر", "پشیلە", "سەگ", "ورچ", "گورگ", "ڕێوی", "ئەسپ", "کەروێشک", "مانگا", "مریشک", "مار"]
        };

        const penalties = [
            "دەبێت بە دەنگی بەرز گۆرانییەکی منداڵان بڵێت! 🎤",
            "دەبێت فۆڵۆوی یەکێک لە ئامادەبووان لە ئینستاگرام بسڕێتەوە! 📸",
            "دەبێت بۆ ماوەی ٢ خولەک بە پێوە بوەستێت و قسە نەکات! 🤫",
            "دەبێت مۆبایلەکەی بداتە دەست کەسی تەنیشتی بۆ بینینی گەلەری! 📱",
            "دەبێت یەک پەرداخ ئاوی سارد بە یەک هەنfilter بخواتەوە! 💧",
            "دەبێت لاسایی دەنگی پشیلە یان سەگ بکاتەوە! 🐱"
        ];

        function showSection(id) {
            document.querySelectorAll('div[id^="section-"]').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function checkImposterVisibility() {
            const container = document.getElementById('player-inputs');
            const selectionDiv = document.getElementById('imposter-selection');
            if (container.children.length >= 5) {
                selectionDiv.classList.remove('hidden');
            } else {
                selectionDiv.classList.add('hidden');
                document.getElementById('imposter-count').value = "1";
            }
        }

        function addInput() {
            const container = document.getElementById('player-inputs');
            const input = document.createElement('input');
            input.type = "text";
            input.placeholder = `ناوی یاریزانی ${container.children.length + 1}`;
            input.className = "w-full p-3 bg-white/50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:border-purple-500 focus:bg-white transition";
            container.appendChild(input);
            checkImposterVisibility();
        }

        function removeInput() {
            const container = document.getElementById('player-inputs');
            if (container.children.length > 4) {
                container.removeChild(container.lastChild);
            }
            checkImposterVisibility();
        }

        function startGame() {
            const inputs = document.querySelectorAll('input[type="text"]');
            players = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
            
            if (players.length < 4) { alert("لانی کەم ٤ ناو بنووسە!"); return; }
            
            let requestedImposters = parseInt(document.getElementById('imposter-count').value);
            if (players.length < 5) requestedImposters = 1;

            // هەڵبژاردنی بەشێکی هەڕەمەکی و پاشان وشەیەکی ناوی
            const categories = Object.keys(categorizedWords);
            const chosenCategory = categories[Math.floor(Math.random() * categories.length)];
            const wordList = categorizedWords[chosenCategory];
            currentSecretWord = wordList[Math.floor(Math.random() * wordList.length)];
            
            let imposterIndices = [];
            while(imposterIndices.length < requestedImposters) {
                let randIndex = Math.floor(Math.random() * players.length);
                if(!imposterIndices.includes(randIndex)) imposterIndices.push(randIndex);
            }

            imposterNames = imposterIndices.map(index => players[index]);
            roles = players.map((_, i) => imposterIndices.includes(i) ? "تۆ فریودەریت! 😈" : currentSecretWord);
            
            currentIndex = 0;
            updateCard();
            showSection('section-game');
        }

        function updateCard() {
            isLocked = false;
            document.getElementById('current-player-name').innerText = players[currentIndex];
            document.getElementById('main-card').classList.remove('flipped');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('hint-button').classList.add('hidden');
            document.getElementById('hint-text').classList.add('hidden');
            document.getElementById('hint-text').innerText = "";
        }

        function flipCard() { 
            if (!isLocked) { 
                const currentRole = roles[currentIndex];
                document.getElementById('card-content').innerText = currentRole; 
                document.getElementById('main-card').classList.add('flipped'); 
                
                // ئەگەر فریودەر بوو، دوگمەی هینت پیشان بدە
                if(currentRole.includes("فریودەریت")) {
                    document.getElementById('hint-button').classList.remove('hidden');
                }
            } 
        }

        function showImposterHint(event) {
            event.stopPropagation(); // ڕێگری لە گەڕانەوەی کارتەکە دەکات
            
            // دۆزینەوەی ئەو بەشەی وشە ڕاستەقینەکەی تێدایە
            let chosenCategory = "";
            for (let cat in categorizedWords) {
                if (categorizedWords[cat].includes(currentSecretWord)) {
                    chosenCategory = cat;
                    break;
                }
            }
            
            // دروستکردنی ٣ وشەی هەڕەمەکی لە هەمان کاتێگۆری کە وشە ئەسڵییەکە نەبن
            let filteredList = categorizedWords[chosenCategory].filter(w => w !== currentSecretWord);
            let hints = [];
            while(hints.length < 3 && filteredList.length > 0) {
                let randW = filteredList[Math.floor(Math.random() * filteredList.length)];
                if(!hints.includes(randW)) hints.push(randW);
            }
            
            // پیشاندانی وشە پێشنیارکراوەکان بە تێکەڵاوی
            document.getElementById('hint-text').innerText = `وشە ڕاستەقینەکە یەکێکە لەم سێ دانەیە: [ ${hints.join(' - ')} ]`;
            document.getElementById('hint-text').classList.remove('hidden');
            document.getElementById('hint-button').classList.add('hidden'); // تەنها یەکجار دەتوانێت کلیک بکات
        }

        function lockCard(event) {
            event.stopPropagation();
            isLocked = true;
            document.getElementById('main-card').classList.remove('flipped');
            setTimeout(() => { document.getElementById('btn-next').classList.remove('hidden'); }, 300);
        }

        function nextPlayer() {
            currentIndex++;
            if (currentIndex < players.length) updateCard();
            else {
                document.getElementById('starter-name').innerText = players[Math.floor(Math.random() * players.length)];
                showSection('section-timer');
            }
        }

        function startTimerCountdown() {
            document.getElementById('btn-start-timer').classList.add('hidden');
            document.getElementById('btn-end-game').classList.remove('hidden');
            let timeLeft = 180;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); display.innerText = "تەواو!"; }
                timeLeft--;
            }, 1000);
        }

        function showFinalResult() {
            clearInterval(timerInterval);
            document.getElementById('imposter-name').innerText = imposterNames.join(' و ');
            showSection('section-finish');
        }

        function generatePenalty() {
            const randomPenalty = penalties[Math.floor(Math.random() * penalties.length)];
            document.getElementById('penalty-text').innerText = randomPenalty;
            document.getElementById('penalty-box').classList.remove('hidden');
            document.getElementById('btn-penalty').innerText = "گۆڕینی سزا 🎲";
        }
    </script>
</body>
</html>
