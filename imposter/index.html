<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێ فریودەرە؟ | زەنگ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #e5e7eb; min-height: 100vh; }
        .neo-box { background: white; border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .btn-action { border: 3px solid #000; box-shadow: 4px 4px 0px #000; transition: all 0.1s; }
        .btn-action:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col items-center">

    <nav class="w-full max-w-md mb-6">
        <a href="../index.html" class="inline-block bg-white border-2 border-black px-4 py-2 font-black shadow-[4px_4px_0px_#000] hover:bg-yellow-400">➔ گەڕانەوە</a>
    </nav>

    <div id="section-setup" class="w-full max-w-md neo-box p-6 md:p-8">
        <h1 class="text-3xl font-[900] mb-6 text-center border-b-4 border-black pb-4">ڕێکخستنی یاری</h1>
        <div id="player-inputs" class="space-y-3">
            <input type="text" placeholder="ناوی یاریزانی ١" class="w-full p-3 border-4 border-black font-bold outline-none focus:bg-yellow-50">
            <input type="text" placeholder="ناوی یاریزانی ٢" class="w-full p-3 border-4 border-black font-bold outline-none focus:bg-yellow-50">
            <input type="text" placeholder="ناوی یاریزانی ٣" class="w-full p-3 border-4 border-black font-bold outline-none focus:bg-yellow-50">
            <input type="text" placeholder="ناوی یاریزانی ٤" class="w-full p-3 border-4 border-black font-bold outline-none focus:bg-yellow-50">
        </div>
        
        <div class="flex gap-3 mt-6">
            <button onclick="addInput()" class="flex-1 bg-green-500 btn-action py-3 font-black text-lg">+ زیادکردن</button>
            <button onclick="removeInput()" class="flex-1 bg-red-500 btn-action py-3 font-black text-lg">- کەمکردن</button>
        </div>
        
        <div id="imposter-selection" class="hidden mt-6 pt-4 border-t-4 border-black border-dotted">
            <label class="block font-black text-lg mb-2 text-right">🕵️‍♂️ ژمارەی فریودەرەکان:</label>
            <select id="imposter-count" class="w-full p-3 border-4 border-black font-bold outline-none bg-white">
                <option value="1">١ فریودەر</option>
                <option value="2">٢ فریودەر</option>
                <option value="3">٣ فریودەر</option>
            </select>
        </div>
        
        <button onclick="startGame()" class="w-full mt-6 bg-yellow-400 btn-action py-4 font-[900] text-xl md:text-2xl">تیروپشک! 🎲</button>
    </div>

    <div id="section-game" class="hidden-section w-full max-w-sm text-center">
        <div class="bg-black text-white inline-block px-6 py-2 font-black text-xl mb-4">نۆبەی: <span id="current-player-name">ناو</span></div>
        <div class="relative w-full h-[350px] md:h-[420px] mb-6" style="perspective: 1000px;">
            <div id="main-card" class="card-inner w-full h-full relative cursor-pointer" onclick="flipCard()">
                <div class="absolute w-full h-full bg-red-500 border-4 border-black flex flex-col items-center justify-center shadow-[8px_8px_0px_#000]" style="backface-visibility: hidden;">
                    <div class="text-8xl mb-2">❓</div>
                    <p class="font-black text-xl text-white">کلیک بکە</p>
                </div>
                <div class="absolute w-full h-full bg-yellow-400 border-4 border-black flex flex-col items-center justify-center p-6 shadow-[8px_8px_0px_#000]" style="transform: rotateY(180deg); backface-visibility: hidden;">
                    <h2 id="card-content" class="text-3xl md:text-4xl font-[900] mb-8">...</h2>
                    <button onclick="lockCard(event)" class="bg-black text-white px-8 py-3 font-black btn-action">بیشارەوە 🔐</button>
                </div>
            </div>
        </div>
        <button id="btn-next" onclick="nextPlayer()" class="hidden w-full bg-green-400 btn-action py-4 font-[900] text-xl">کەسی دواتر ➔</button>
    </div>

    <div id="section-timer" class="hidden-section text-center max-w-md w-full px-4">
        <div class="neo-box p-8 bg-white border-blue-500">
            <h2 class="text-2xl font-[900] mb-4 text-blue-600">کاتی گفتوگۆ</h2>
            
            <div class="bg-gray-100 border-4 border-black p-4 mb-6 shadow-[4px_4px_0px_#000]">
                <p class="font-bold text-gray-500 mb-1">کەسی یەکەم کە قسە دەکات:</p>
                <h3 id="starter-name" class="text-3xl font-black text-black">...</h3>
            </div>

            <div id="timer-display" class="text-7xl font-black my-8 text-red-600">03:00</div>
            <button id="btn-start-timer" onclick="startTimerCountdown()" class="w-full bg-blue-500 text-white py-4 font-black btn-action text-xl mb-4">دەستپێکردنی کات ⏱️</button>
            <button id="btn-end-game" onclick="showFinalResult()" class="hidden w-full bg-red-500 text-white py-4 font-black btn-action text-xl">کێ فریودەر بوو(ئەنجام)؟</button>
        </div>
    </div>

    <div id="section-finish" class="hidden-section text-center max-w-md w-full px-4">
        <div class="neo-box p-8 bg-white">
            <h2 class="text-3xl font-[900] mb-6 text-gray-500 italic">فریودەرەکان برتی بوون لە:</h2>
            <div class="bg-red-100 border-4 border-black p-6 mb-8 shadow-[6px_6px_0px_#000]">
                <h3 id="imposter-name" class="text-3xl font-black text-red-600 leading-relaxed">ناو</h3>
            </div>
            <button onclick="location.reload()" class="bg-black text-white px-10 py-4 font-black btn-action text-xl italic">یاری نوێ 🔄</button>
        </div>
    </div>

    <script>
        let players = []; let roles = []; let currentIndex = 0; let isLocked = false;
        let imposterNames = []; let timerInterval; // گۆڕینی imposterName بۆ کۆمەڵە (Array)
        const wordBank = [
            // --- وشە کۆنەکان ---
            "شێر", "مۆبایل", "هەولێر", "پیتزا", "قاوە", "سەعات", "پشیلە", "فڕۆکە", "کەباب", "گۆڵ", "ماسی", "کتێب",

            // --- خواردن و خواردنەوە (٢٠ وشە) ---
            "برنج", "شۆربا", "یاپراخ", "شاوەرمە", "فەلافل", "بورگەر", "کفتە", "شێلم", "کولا", "چای", 
            "شەکراو", "ماستاو", "نیسکێنە", "هێلکە", "پەنیر", "هەنگوین", "گوێز", "باڕەقە", "زەڵاتە", "ترشی",

            // --- میوە و سەوزە (١٥ وشە) ---
            "سێو", "شەمامە", "شوتی", "پرتەقاڵ", "مۆز", "کێوی", "هەنار", "ترێ", "قەیسی", "خەیار", 
            "تەماتە", "پیاز", "سیر", "پەتاتە", "گێزەر",

            // --- وڵات و شار و شوێنەکان (١٥ وشە) ---
            "سلێمانی", "دهۆک", "کەرکووک", "کۆیە", "زاخۆ", "عێراق", "کوردستان", "ئێران", "تورکیا", "بەغداد", 
            "پاریس", "قوتابخانە", "بازاڕ", "سەیرانگا", "چێشتخانە",

            // --- ئامێر و تەکنەلۆجیا (١٥ وشە) ---
            "کۆمپیوتەر", "تەلەفزیۆن", "سەلاجە", "سپلیت", "مایکرۆفۆن", "کامێرا", "گڵۆپ", "تەختەکلیل", "ماوس", "ئایپاد", 
            "ئۆتۆمبێل", "پاسکیل", "ماتۆڕ", "شەمەندەفەر", "پاتری",

            // --- ئاژەڵ و باڵندە (١٥ وشە) ---
            "سەگ", "ورچ", "گورگ", "ڕێوی", "ئەسپ", "کەروێشک", "مە things", "مانگا", "مریشک", "کۆتر", 
            "داڵ", "مێشولە", "هەنگ", "دووپشک", "مار",

            // --- شتومەکی ناوماڵ و ڕۆژانە (١٠ وشە) ---
            "قەڵەم", "کورسی", "مێز", "پەردە", "جانتا", "پێڵاو", "قاپ", "کەوچک", "چەقۆ", "تەختە",

            // --- وەرزش و یاری (١٠ وشە) ---
            "تۆپی پێ", "مەلەوانی", "ڕاکردن", "تێنس", "شەترەنج", "پۆکەر", "پاس", "هاوار", "فیکە", "ناوبژیوان"
        ];

        function showSection(id) {
            document.querySelectorAll('div[id^="section-"]').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function checkImposterVisibility() {
            const container = document.getElementById('player-inputs');
            const selectionDiv = document.getElementById('imposter-selection');
            // ئەگەر ٥ یان زیاتر بوون بژاردەی فریودەر پیشان دەدرێت
            if (container.children.length >= 5) {
                selectionDiv.classList.remove('hidden');
            } else {
                selectionDiv.classList.add('hidden');
                document.getElementById('imposter-count').value = "1"; // دەگەڕێتەوە سەر ١ ئەگەر ناو کەمکرایەوە
            }
        }

        function addInput() {
            const container = document.getElementById('player-inputs');
            const input = document.createElement('input');
            input.type = "text";
            input.placeholder = `ناوی یاریزانی ${container.children.length + 1}`;
            input.className = "w-full p-3 border-4 border-black font-bold outline-none focus:bg-yellow-50";
            container.appendChild(input);
            checkImposterVisibility();
        }

        function removeInput() {
            const container = document.getElementById('player-inputs');
            if (container.children.length > 4) {
                container.removeChild(container.lastChild);
            }
            checkImposterVisibility();
        }

        function startGame() {
            const inputs = document.querySelectorAll('input[type="text"]');
            players = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
            
            if (players.length < 4) { alert("لانی کەم ٤ ناو بنووسە!"); return; }
            
            // وەرگرتنی ژمارەی فریودەرەکان
            let requestedImposters = parseInt(document.getElementById('imposter-count').value);
            
            // ئەگەر ژمارەی یاریزانەکان کەمتر بوو لە ٥ بە زۆر دەبێت ١ فریودەر بێت
            if (players.length < 5) {
                requestedImposters = 1;
            } else if (requestedImposters >= players.length - 1) {
                alert("ناکرێت ئەم چەندە فریودەرە دابنێیت! دەبێت لانی کەم ٢ یاریزانی ئاسایی بمێننەوە.");
                return;
            }

            const word = wordBank[Math.floor(Math.random() * wordBank.length)];
            
            // دیاریکردنی ئیندێکسی فریودەرەکان بە شێوازی هەڕەمەکی بێ دووبارەبوونەوە
            let imposterIndices = [];
            while(imposterIndices.length < requestedImposters) {
                let randIndex = Math.floor(Math.random() * players.length);
                if(!imposterIndices.includes(randIndex)) {
                    imposterIndices.push(randIndex);
                }
            }

            // کۆکردنەوەی ناوی فریودەرەکان بۆ کۆتایی یارییەکە
            imposterNames = imposterIndices.map(index => players[index]);
            
            // دابەشکردنی ڕۆڵەکان
            roles = players.map((_, i) => imposterIndices.includes(i) ? "تۆ فریودەریت! 😈" : word);
            
            currentIndex = 0;
            updateCard();
            showSection('section-game');
        }

        function updateCard() {
            isLocked = false;
            document.getElementById('current-player-name').innerText = players[currentIndex];
            document.getElementById('main-card').classList.remove('flipped');
            document.getElementById('btn-next').classList.add('hidden');
        }

        function flipCard() { 
            if (!isLocked) { 
                document.getElementById('card-content').innerText = roles[currentIndex]; 
                document.getElementById('main-card').classList.add('flipped'); 
            } 
        }

        function lockCard(event) {
            event.stopPropagation();
            isLocked = true;
            document.getElementById('main-card').classList.remove('flipped');
            setTimeout(() => { document.getElementById('btn-next').classList.remove('hidden'); }, 300);
        }

        function nextPlayer() {
            currentIndex++;
            if (currentIndex < players.length) updateCard();
            else {
                document.getElementById('starter-name').innerText = players[Math.floor(Math.random() * players.length)];
                showSection('section-timer');
            }
        }

        function startTimerCountdown() {
            document.getElementById('btn-start-timer').classList.add('hidden');
            document.getElementById('btn-end-game').classList.remove('hidden');
            let timeLeft = 180;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); display.innerText = "تەواو!"; }
                timeLeft--;
            }, 1000);
        }

        function showFinalResult() {
            clearInterval(timerInterval);
            // لێرەدا ناوی هەموو فریودەرەکان بە جیاکاری کۆما پیشان دەدرێت
            document.getElementById('imposter-name').innerText = imposterNames.join(' و ');
            showSection('section-finish');
        }
    </script>
</body>
</html>
