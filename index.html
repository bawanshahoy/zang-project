<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زەنگ | ZANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #e5e7eb;
            min-height: 100vh;
        }

        .zang-title {
            color: #ffcc00;
            filter: drop-shadow(4px 4px 0px #000);
            -webkit-text-stroke: 1.5px #000;
        }

        .game-card {
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            transition: all 0.15s ease-in-out;
        }

        .game-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #000;
        }

        .badge-new {
            background-color: #ff4d4d;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
        }

        .btn-yellow { 
            background-color: #ffcc00; 
            border: 3px solid #000; 
            box-shadow: 4px 4px 0px #000; 
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center my-10 md:my-16">
        <h1 class="text-6xl md:text-9xl font-[900] zang-title mb-8">زەنگ</h1>
        <div class="flex justify-center gap-3">
            <div class="bg-[#ff4d4d] w-12 md:w-16 h-3 md:h-4 border-2 border-black"></div>
            <div class="bg-[#22c55e] w-12 md:w-16 h-3 md:h-4 border-2 border-black"></div>
            <div class="bg-[#3b82f6] w-12 md:w-16 h-3 md:h-4 border-2 border-black"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto space-y-6 md:space-y-10">
        <!-- یاری یەکەم -->
        <a href="imposter/index.html" class="game-card p-6 md:p-8 block group">
            <div class="flex justify-between items-start mb-4 md:mb-6">
                <div class="text-6xl md:text-8xl group-hover:scale-105 transition">🃏</div>
                <div class="badge-new text-white px-3 py-1 md:px-5 md:py-2 font-black text-sm md:text-lg">ئێستا بکەرەوە</div>
            </div>
            <h2 class="text-3xl md:text-5xl font-[900] mb-2 md:mb-4">کێ فریودەرە؟</h2>
            <p class="text-lg md:text-2xl font-bold text-gray-600 leading-snug">
                هاوڕێکانت کۆبکەرەوە و بزانە کێ لە گروپەکەدا فێڵ دەکات و وشەکە نازانێت!
            </p>
            <div class="mt-6 md:mt-8">
                <div class="btn-yellow inline-block px-6 py-2 md:px-10 md:py-4 font-black text-xl md:text-2xl">دەستپێکردن</div>
            </div>
        </a>

        <!-- بەم زوانە -->
        <div class="game-card p-8 bg-[#d1d5db] border-dashed border-4 opacity-70">
            <div class="flex items-center gap-4 md:gap-6">
                <div class="text-5xl md:text-6xl grayscale">🔒</div>
                <div>
                    <h2 class="text-2xl md:text-4xl font-[900] text-gray-500">بەم زوانە...</h2>
                    <p class="text-lg md:text-xl font-bold text-gray-400">خەریکی ئامادەکردنی یارییەکی نوێین</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-center">
        <div class="inline-block border-4 border-black p-4 bg-white shadow-[6px 6px 0px #000]">
            <span class="text-lg font-bold text-gray-500">گەشەپێدراوە لەلایەن:</span>
            <span class="text-xl md:text-2xl font-[900] text-blue-600 mr-1">باوان شاهۆیی</span>
        </div>
    </footer>

</body>
</html>
