<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاممان زیاتر؟ | زەنگ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: linear-gradient(135deg, #f3f4f6 0%, #eef2ff 50%, #fae8ff 100%); 
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }

        /* 🔮 ڕووناکی نەرمی نیۆن لە پشتەوە - ڕەنگی سەوز */
        .neon-bg-1 {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, rgba(16,185,129,0) 70%);
            top: -5%;
            left: -10%;
            z-index: -1;
        }

        /* 🎛️ دیزاینی نوێی کارتەکان بە ستایلی درەوشانەوەی گەشاوە */
        .game-card-neon {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-bottom: 5px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .hidden-section { display: none !important; }

        /* 🔘 ستایلی دوگمە گەشمۆدێڕنەکان */
        .btn-cyber {
            border-bottom: 4px solid rgba(0,0,0,0.2);
            transition: all 0.15s ease-in-out;
        }
        .btn-cyber:active {
            transform: translateY(3px);
            border-bottom-width: 1px;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="neon-bg-1"></div>

    <header class="w-full max-w-4xl mx-auto mb-8 px-4 py-3 bg-white/50 backdrop-blur-md rounded-2xl border border-white/60 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></div>
            <h1 class="text-xl md:text-2xl font-[900] text-gray-800">کاممان زیاتر؟</h1>
        </div>
        <div class="flex items-center gap-4">
            <nav class="flex gap-6 font-black text-sm md:text-lg text-gray-700">
                <a href="../index.html" class="hover:text-green-600 border-b-2 border-transparent hover:border-green-600 pb-0.5 transition">➔ گەڕانەوە</a>
            </nav>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto">

        <div id="section-setup" class="game-card-neon p-6 md:p-8 text-center rounded-2xl">
            <h1 class="text-3xl font-[900] mb-6 border-b border-gray-200/60 pb-4 text-green-600">کاممان زیاتر؟ 🤔</h1>
            <p class="text-gray-600 font-bold mb-6 leading-relaxed">یاسا: پرسیارێک دێتە سەر شاشە، بە ٣، ٢، ١ دەبێت هەمووان بە دەست ئاماژە بۆ ئەو کەسە بکەن کە پرسیارەکە لەسەر ئەوە کڵاس دەکات!</p>
            
            <button onclick="startGame()" class="w-full btn-cyber bg-gradient-to-r from-green-500 to-emerald-500 text-white py-4 rounded-xl font-[900] text-xl md:text-2xl shadow-lg shadow-green-500/20">دەستپێکردنی یاری 🚀</button>
        </div>

        <div id="section-game" class="hidden-section w-full text-center">
            <div class="game-card-neon p-8 min-h-[250px] flex flex-col justify-center items-center mb-6 rounded-2xl border-t-4 border-t-green-500">
                <span class="bg-green-50 text-green-600 px-4 py-1 rounded-full font-black text-xs tracking-wide mb-4 inline-block shadow-sm">پرسیار</span>
                <h2 id="question-text" class="text-2xl md:text-3xl font-[900] text-gray-800 leading-relaxed">...</h2>
            </div>

            <div id="countdown-box" class="hidden game-card-neon p-4 bg-red-50/80 border border-red-200 text-red-600 mb-6 font-black text-2xl rounded-xl shadow-inner">
                ئاماژە بکە لە دوای: <span id="countdown-number" class="text-red-700 font-[900]">٣</span>
            </div>

            <div class="flex gap-4">
                <button onclick="startCountdown()" class="flex-1 bg-gray-50 border border-gray-200 text-gray-700 hover:bg-gray-100 btn-cyber py-4 rounded-xl font-black text-base md:text-lg transition-all">ژمارەی پێچەوانە ⏱️</button>
                <button onclick="nextQuestion()" class="flex-1 btn-cyber bg-gradient-to-r from-green-500 to-emerald-500 text-white py-4 rounded-xl font-black text-base md:text-lg shadow-md shadow-green-500/10">پرسیاری دواتر ➔</button>
            </div>
        </div>

    </main>

    <footer class="mt-16 text-center font-black text-gray-400 tracking-wider text-sm w-full">
        &copy; 2026 ZANG - ALL RIGHTS RESERVED
    </footer>

    <script>
        let questions = [
            "کێ لە هەمووان زیاتر ئەگەری هەیە ببێتە ملیۆنێر؟ 💰",
            "کێ لە هەمووان زیاتر مۆبایلەکەی لە دەست دەکەوێت و دەشکێت؟ 📱",
            "کێ لە هەمووان زیاتر بەبێ هۆکار لە ناو چاتدا تووڕە دەبێت؟ 😡",
            "کێ لە هەمووان زیاتر کاتەکانی بە خەو بەسەر دەبات؟ 😴",
            "کێ ئەگەری زیاترە لە کاتی ڕۆشتن لە سەر شەقام بکەوێت؟ 🚶‍♂️",
            "کێ لە هەمووان زیاتر بە دزییەوە سەیری مۆبایلی دەوروبەری دەکات؟ 👁️",
            "کێ ئەگەری زیاترە بچێتە چێشتخانەیەک و لە کۆتاییدا پارەی پێ نەبێت؟ 🍽️",
            "کێ لە هەمووان زیاتر عاشقی خواردنی توون و تیژە؟ 🌶️",
            "کێ لە هەمووان زیاتر درەنگ وەڵامی نامە دەداتەوە؟ ⏳",
            "کێ ئەگەری زیاترە لە تاقیکردنەوەدا فێڵ (قۆپیش) بکات و بگیرێت؟ 📝",
            "کێ لە هەمووان زیاتر لێخوڕینی ئۆتۆمبێلی خراپە؟ 🚗",
            "کێ زۆرترین کات لەبەردەم ئاوێنەدا بەسەر دەبات؟ 🪞",
            "کێ لە هەمووان زیاتر حەزی لە قسەی نەستەق و کۆنە؟ 👴",
            "کێ ئەگەری زیاترە گۆرانی bڵێت کاتێک لە حەمامە؟ 🎤",
            "کێ لە هەمووان زیاتر بە شتی بچووک پێدەکەنێت؟ 😂",
            "کێ ئەگەری زیاترە لە فیلمێکی ترسناکدا لە ترسا چاوی دابخات؟ 🍿",
            "کێ لە هەمووان دەوڵەمەنتر دەبێت لە داهاتوودا؟ 💎",
            "کێ لە هەمووان زیاتر پۆستی سێریاس و فەلسەفی دەکات؟ 🧠",
            "کێ ئەگەری زیاترە لە گەشتێکدا ڕێگا ون بکات؟ 🗺️",
            "کێ زۆرترین پارە بە خواردنی دەرەوە دەدات؟ 🍔"
        ];

        let usedQuestions = [];

        function showSection(id) {
            document.getElementById('section-setup').classList.add('hidden-section');
            document.getElementById('section-game').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
        }

        function startGame() {
            usedQuestions = [];
            showSection('section-game');
            nextQuestion();
        }

        function nextQuestion() {
            document.getElementById('countdown-box').classList.add('hidden');

            if (usedQuestions.length === questions.length) {
                alert("هەموو پرسیارەکان تەواو بوون! دووبارە لە سەرەتاوە دەستپێدەکەینەوە.");
                usedQuestions = [];
            }

            let availableQuestions = questions.filter(q => !usedQuestions.includes(q));
            let randomQ = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
            
            usedQuestions.push(randomQ);
            document.getElementById('question-text').innerText = randomQ;
        }

        function startCountdown() {
            const countdownBox = document.getElementById('countdown-box');
            const countdownNum = document.getElementById('countdown-number');
            
            countdownBox.classList.remove('hidden');
            let count = 3;
            countdownNum.innerText = count;

            let interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNum.innerText = count;
                } else if (count === 0) {
                    countdownNum.innerText = "ئاماژە بکە! 👉";
                } else {
                    clearInterval(interval);
                }
            }, 1000);
        }
    </script>
</body>
</html>
