<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاممان زیاتر؟ | زەنگ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #e5e7eb; min-height: 100vh; }
        .neo-box { background: white; border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .btn-action { border: 3px solid #000; box-shadow: 4px 4px 0px #000; transition: all 0.1s; }
        .btn-action:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col items-center">

    <nav class="w-full max-w-md mb-6">
        <a href="../index.html" class="inline-block bg-white border-2 border-black px-4 py-2 font-black shadow-[4px_4px_0px_#000] hover:bg-yellow-400">➔ گەڕانەوە</a>
    </nav>

    <div id="section-setup" class="w-full max-w-md neo-box p-6 md:p-8 text-center">
        <h1 class="text-3xl font-[900] mb-6 border-b-4 border-black pb-4 text-purple-600">کاممان زیاتر؟ 🤔</h1>
        <p class="text-gray-600 font-bold mb-6">یاسا: پرسیارێک دێتە سەر شاشە، بە ٣، ٢، ١ دەبێت هەمووان بە دەست ئاماژە بۆ ئەو کەسە بکەن کە پرسیارەکە لەسەر ئەوە کڵاس دەکات!</p>
        
        <button onclick="startGame()" class="w-full bg-yellow-400 btn-action py-4 font-[900] text-xl md:text-2xl">دەستپێکردنی یاری 🚀</button>
    </div>

    <div id="section-game" class="hidden-section w-full max-w-md text-center">
        <div class="neo-box p-8 bg-white min-h-[250px] flex flex-col justify-center items-center mb-6">
            <span class="text-sm font-black text-purple-500 mb-2 italic">پرسیار:</span>
            <h2 id="question-text" class="text-2xl md:text-3xl font-[900] text-black leading-relaxed">...</h2>
        </div>

        <div id="countdown-box" class="hidden neo-box p-4 bg-red-100 mb-6 font-black text-2xl text-red-600">
            ئاماژە بکە لە دوای: <span id="countdown-number">٣</span>
        </div>

        <div class="flex gap-4">
            <button onclick="startCountdown()" class="flex-1 bg-blue-400 btn-action py-4 font-black text-lg">ژمارەی پێچەوانە ⏱️</button>
            <button onclick="nextQuestion()" class="flex-1 bg-green-400 btn-action py-4 font-black text-lg">پرسیاری دواتر ➔</button>
        </div>
    </div>

    <script>
        let questions = [
            "کێ لە هەمووان زیاتر ئەگەری هەیە ببێتە ملیۆنێر؟ 💰",
            "کێ لە هەمووان زیاتر مۆبایلەکەی لە دەست دەکەوێت و دەشکێت؟ 📱",
            "کێ لە هەمووان زیاتر بەبێ هۆکار لە ناو چاتدا تووڕە دەبێت؟ 😡",
            "کێ لە هەمووان زیاتر کاتەکانی بە خەو بەسەر دەبات؟ 😴",
            "کێ ئەگەری زیاترە لە کاتی ڕۆشتن لە سەر شەقام بکەوێت؟ 🚶‍♂️",
            "کێ لە هەمووان زیاتر بە دزییەوە سەیری مۆبایلی دەوروبەری دەکات؟ 👁️",
            "کێ ئەگەری زیاترە بچێتە چێشتخانەیەک و لە کۆتاییدا پارەی پێ نەبێت؟ 🍽️",
            "کێ لە هەمووان زیاتر عاشقی خواردنی توون و تیژە؟ 🌶️",
            "کێ لە هەمووان زیاتر درەنگ وەڵامی نامە دەداتەوە؟ ⏳",
            "کێ ئەگەری زیاترە لە تاقیکردنەوەدا فێڵ (قۆپیش) بکات و بگیرێت؟ 📝",
            "کێ لە هەمووان زیاتر لێخوڕینی ئۆتۆمبێلی خراپە؟ 🚗",
            "کێ زۆرترین کات لەبەردەم ئاوێنەدا بەسەر دەبات؟ 🪞",
            "کێ لە هەمووان زیاتر حەزی لە قسەی نەستەق و کۆنە؟ 👴",
            "کێ ئەگەری زیاترە گۆرانی بڵێت کاتێک لە حەمامە؟ 🎤",
            "کێ لە هەمووان زیاتر بە شتی بچووک پێدەکەنێت؟ 😂",
            "کێ ئەگەری زیاترە لە فیلمێکی ترسناکدا لە ترسا چاوی دابخات؟ 🍿",
            "کێ لە هەمووان دەوڵەمەنتر دەبێت لە داهاتوودا؟ 💎",
            "کێ لە هەمووان زیاتر پۆستی سێریاس و فەلسەفی دەکات؟ 🧠",
            "کێ ئەگەری زیاترە لە گەشتێکدا ڕێگا ون بکات؟ 🗺️",
            "کێ زۆرترین پارە بە خواردنی دەرەوە دەدات؟ 🍔"
        ];

        let usedQuestions = [];

        function showSection(id) {
            document.getElementById('section-setup').classList.add('hidden-section');
            document.getElementById('section-game').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
        }

        function startGame() {
            usedQuestions = [];
            showSection('section-game');
            nextQuestion();
        }

        function nextQuestion() {
            // شاردنەوەی بۆکسی تاژمێرەکە لە کاتی گۆڕینی پرسیار
            document.getElementById('countdown-box').classList.add('hidden');

            if (usedQuestions.length === questions.length) {
                alert("هەموو پرسیارەکان تەواو بوون! دووبارە لە سەرەتاوە دەستپێدەکەینەوە.");
                usedQuestions = [];
            }

            let availableQuestions = questions.filter(q => !usedQuestions.includes(q));
            let randomQ = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
            
            usedQuestions.push(randomQ);
            document.getElementById('question-text').innerText = randomQ;
        }

        function startCountdown() {
            const countdownBox = document.getElementById('countdown-box');
            const countdownNum = document.getElementById('countdown-number');
            
            countdownBox.classList.remove('hidden');
            let count = 3;
            countdownNum.innerText = count;

            let interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNum.innerText = count;
                } else if (count === 0) {
                    countdownNum.innerText = "ئاماژە بکە! 👉";
                } else {
                    clearInterval(interval);
                }
            }, 1000);
        }
    </script>
</body>
</html>
