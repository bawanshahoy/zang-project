<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شیرینی پڕۆژەکە | زەنگ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #eef2ff 50%, #fae8ff 100%);
            min-height: 100vh;
            overflow-x: hidden; /* ڕێگری تەواو لە جوڵان بۆ ڕاست و چەپ */
            position: relative;
            width: 100%;
        }

        /* 🔒 لێرەدا کارتەکە کرا بە تەواو جێگیر بەبێ هیچ ئەنیمەیشنێکی قورس */
        .game-card-neon {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-bottom: 6px solid rgba(0, 0, 0, 0.12);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="w-full max-w-4xl px-4 py-3 md:px-8 bg-white/50 backdrop-blur-md rounded-2xl border border-white/60 shadow-sm mx-auto">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_#eab308] animate-pulse"></div>
                <h1 class="text-2xl md:text-3xl font-[900] tracking-tight text-gray-800">زەنگ</h1>
            </div>
            <div class="flex items-center gap-4">
                <nav class="flex gap-4 md:gap-6 font-black text-sm md:text-lg text-gray-700">
                    <a href="index.html" class="hover:text-purple-600 border-b-2 border-transparent hover:border-purple-600 pb-0.5 transition">سەرەکی</a>
                    <a href="about.html" class="hover:text-red-600 border-b-2 border-transparent hover:border-red-600 pb-0.5 transition">دەربارە</a>
                    <a href="donation.html" class="text-amber-500 border-b-2 border-amber-500 pb-0.5 transition">شیرینی</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto mt-12 md:mt-16">
        <div class="game-card-neon p-6 md:p-8 rounded-3xl border-t-4 border-t-amber-500 text-center">
            
            <div class="text-6xl mb-4">🍰</div>
            <h2 class="text-2xl font-[900] text-amber-600 mb-2"> کێکەکمان لۆ بکڕە🤭</h2>
            <p class="text-gray-500 font-bold text-sm leading-relaxed mb-6">
                بۆ پشتیوانی پڕۆژەکە و ناردنی شیرینی، دەتوانیت بارکۆدی خوارەوە سکان بکەیت یان ژمارەکە کۆپی بکەیت و لە ناو ئەپی فاستپەی بنێریت.
            </p>

            <div class="bg-white p-3 inline-block rounded-2xl border-2 border-dashed border-amber-400 mb-4 shadow-sm">
                <img src="fastpay-qr.png" alt="FastPay QR" class="w-48 h-48 object-contain rounded-xl">
            </div>

            <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-200">
                <span id="phoneNumber" class="font-mono font-black text-gray-700 text-base tracking-wider">07501234567</span>
                <button onclick="copyNumber()" id="copyBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-black text-xs px-4 py-2 rounded-lg transition active:scale-95">کۆپی بکە</button>
            </div>

            <div class="mt-6 border-t border-gray-200/60 pt-4">
                <p class="text-[11px] text-gray-400 font-black">سپاس بۆ پشتیوانیکردنی پڕۆژە لۆکاڵییەکان 🤝</p>
            </div>

        </div>
    </main>

    <script>
        function copyNumber() {
            const num = document.getElementById('phoneNumber').innerText;
            navigator.clipboard.writeText(num);
            
            const btn = document.getElementById('copyBtn');
            btn.innerText = "کۆپی بوو! ✓";
            btn.classList.remove('bg-amber-500');
            btn.classList.add('bg-green-600');
            
            setTimeout(() => {
                btn.innerText = "کۆپی بکە";
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-amber-500');
            }, 2000);
        }
    </script>

    <footer class="mt-16 text-center font-black text-gray-400 tracking-wider text-sm w-full">
        &copy; 2026 ZANG - ALL RIGHTS RESERVED
    </footer>

</body>
</html>
